version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-icommerce}
      POSTGRES_USER: ${DB_USER:-icommerce}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-icommerce2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-icommerce} -d ${DB_NAME:-icommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    restart: always
    # daphne for ASGI/WebSocket support (replaces gunicorn)
    command: daphne -b 0.0.0.0 -p 8000 backend.asgi:application
    env_file:
      - ./backend/.env.production
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=backend.settings
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  celery_worker:
    build:
      context: ./backend
      target: production
    restart: always
    command: celery -A backend worker -l info
    env_file:
      - ./backend/.env.production
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - media_volume:/app/mediafiles
    networks:
      - app_network

  celery_beat:
    build:
      context: ./backend
      target: production
    restart: always
    command: celery -A backend beat -l info
    env_file:
      - ./backend/.env.production
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        # Build-time: public API URL must be the browser-accessible URL
        NEXT_PUBLIC_SERVER_URL: https://elarbol.icommerce.com.bd
    restart: always
    env_file:
      - ./frontend/.env.production
    environment:
      # Runtime server-side API: use internal Docker network for SSR calls
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
      - NODE_ENV=production
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/backend/staticfiles:ro
      - media_volume:/app/backend/mediafiles:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  app_network:
    driver: bridge
